<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="parchBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="50%" stop-color="#ebd5a7"/>
      <stop offset="100%" stop-color="#dfc78e"/>
    </linearGradient>
  </defs>

  <!-- Parchment background -->
  <rect width="1200" height="630" fill="url(#parchBg)"/>

  <!-- Decorative border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#8b6914" stroke-width="3" rx="4"/>
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="#8b6914" stroke-width="1" rx="2"/>

  <!-- Corner ornaments -->
  <circle cx="45" cy="45" r="6" fill="#8b6914" opacity="0.6"/>
  <circle cx="1155" cy="45" r="6" fill="#8b6914" opacity="0.6"/>
  <circle cx="45" cy="585" r="6" fill="#8b6914" opacity="0.6"/>
  <circle cx="1155" cy="585" r="6" fill="#8b6914" opacity="0.6"/>

  <!-- Top decorative line -->
  <line x1="200" y1="160" x2="1000" y2="160" stroke="#8b6914" stroke-width="1" opacity="0.5"/>
  <line x1="250" y1="164" x2="950" y2="164" stroke="#8b6914" stroke-width="0.5" opacity="0.3"/>

  <!-- Title: CMRP -->
  <text x="600" y="130" text-anchor="middle" font-family="serif" font-weight="700" font-size="72" fill="#2c1810" letter-spacing="12">CMRP</text>

  <!-- Subtitle -->
  <text x="600" y="220" text-anchor="middle" font-family="serif" font-size="36" fill="#4a3520" letter-spacing="4">CHARACTER SHEET</text>

  <!-- Divider -->
  <line x1="380" y1="250" x2="560" y2="250" stroke="#8b6914" stroke-width="1" opacity="0.5"/>
  <circle cx="600" cy="250" r="4" fill="#8b6914" opacity="0.5"/>
  <line x1="640" y1="250" x2="820" y2="250" stroke="#8b6914" stroke-width="1" opacity="0.5"/>

  <!-- Description -->
  <text x="600" y="310" text-anchor="middle" font-family="serif" font-size="24" fill="#5a4530" font-style="italic">A Medieval RPG Character Creator</text>

  <!-- Dice illustrations -->
  <polygon points="320,345 350,397 290,397" fill="none" stroke="#8b6914" stroke-width="1.5" opacity="0.4"/>
  <text x="320" y="388" text-anchor="middle" font-family="serif" font-size="16" fill="#8b6914" opacity="0.4">20</text>

  <polygon points="600,370 628.5,390.7 617.6,424.3 582.4,424.3 571.5,390.7" fill="none" stroke="#8b6914" stroke-width="1.5" opacity="0.4"/>
  <text x="600" y="412" text-anchor="middle" font-family="serif" font-size="14" fill="#8b6914" opacity="0.4">12</text>

  <polygon points="870,355 896,385 870,415 844,385" fill="none" stroke="#8b6914" stroke-width="1.5" opacity="0.4"/>
  <text x="870" y="392" text-anchor="middle" font-family="serif" font-size="14" fill="#8b6914" opacity="0.4">8</text>

  <!-- Bottom decorative line -->
  <line x1="200" y1="470" x2="1000" y2="470" stroke="#8b6914" stroke-width="1" opacity="0.5"/>

  <!-- URL -->
  <text x="600" y="530" text-anchor="middle" font-family="serif" font-size="22" fill="#8b6914" letter-spacing="3" opacity="0.7">cmrp.mittn.ca</text>

  <!-- Bottom ornament -->
  <circle cx="600" cy="565" r="3" fill="#8b6914" opacity="0.4"/>
  <circle cx="585" cy="565" r="2" fill="#8b6914" opacity="0.4"/>
  <circle cx="615" cy="565" r="2" fill="#8b6914" opacity="0.4"/>
</svg>
